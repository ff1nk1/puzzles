services:
  backend:
    build: ./backend
    image: backend
    container_name: puzzle_site_backend
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app:/app/backend:/app/backend/api:/app/backend/backend/api
    networks:
      - docker_net
    volumes:
      - .:/app
    working_dir: /app
    ports:
      - "8000:8000"
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    depends_on:
      - database
      - redis




  redis:
    image: redis:7-alpine
    expose:
      - 6379
    volumes:
      - redis-data:/data
    networks:
      - docker_net




  database:
    image: postgres:17-alpine
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
    volumes:
       - postgres-data:/var/lib/postgresql/data
    networks:
      - docker_net




networks:
  docker_net:
    driver: bridge

volumes:
  postgres-data:
  redis-data: